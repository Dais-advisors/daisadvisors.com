<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Income Tax Comparison Tool FY 2025-26</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0b5ed7;
margin-bottom:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#0b5ed7;
color:#fff;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#084298;
}

.result{
margin-top:25px;
padding:20px;
border-radius:10px;
background:#eef5ff;
display:none;
}

.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.highlight{
font-size:20px;
font-weight:bold;
color:green;
}

.recommend{
font-size:18px;
font-weight:bold;
color:#0b5ed7;
margin-top:15px;
}

.contact{
margin-top:20px;
text-align:center;
}

.contact a{
display:inline-block;
padding:12px 20px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.small{
font-size:13px;
color:#666;
margin-top:10px;
}

@media(max-width:600px){
h1{
font-size:24px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Income Tax Comparison Tool<br>FY 2025-26</h1>

<div class="input-group">
<label>Gross Annual Salary (₹)</label>
<input type="number" id="salary" value="0">
</div>

<div class="input-group">
<label>HRA Exemption (Old Regime) (₹)</label>
<input type="number" id="hra" value="0">
</div>

<div class="input-group">
<label>80C Investment (₹)</label>
<input type="number" id="c80c" value="0">
</div>

<div class="input-group">
<label>80D Medical Insurance (₹)</label>
<input type="number" id="c80d" value="0">
</div>

<div class="input-group">
<label>NPS u/s 80CCD(1B) (₹)</label>
<input type="number" id="nps" value="0">
</div>

<div class="input-group">
<label>Home Loan Interest (₹)</label>
<input type="number" id="home" value="0">
</div>

<div class="input-group">
<label>Other Deductions (₹)</label>
<input type="number" id="other" value="0">
</div>

<button onclick="calculateTax()">Compare Tax</button>

<div class="result" id="result">

<div class="card">
<h3>Old Regime</h3>
<p>Taxable Income: ₹ <span id="oldIncome"></span></p>
<p>Tax Liability: ₹ <span id="oldTax"></span></p>
</div>

<div class="card">
<h3>New Regime</h3>
<p>Taxable Income: ₹ <span id="newIncome"></span></p>
<p>Tax Liability: ₹ <span id="newTax"></span></p>
</div>

<div class="card">
<p class="highlight" id="saving"></p>
<p class="recommend" id="recommend"></p>
</div>

<div class="contact">
<p><strong>Need Help Filing Your ITR?</strong></p>
<br>
<a href="https://wa.me/919999999999">
Chat on WhatsApp
</a>
</div>

<div class="small">
Tax calculation is indicative and subject to applicable provisions of the Income-tax Act, 1961.
</div>

</div>
</div>

<script>

function round(num){
return Math.round(num);
}

function oldRegimeTax(income){

let tax=0;

if(income<=250000){
tax=0;
}
else if(income<=500000){
tax=(income-250000)*0.05;
}
else if(income<=1000000){
tax=12500+(income-500000)*0.20;
}
else{
tax=112500+(income-1000000)*0.30;
}

if(income<=500000){
tax=Math.max(0,tax-12500);
}

tax=tax*1.04;

return round(tax);
}

function newRegimeTax(income){

let tax=0;

let slabs=[
[400000,0],
[800000,0.05],
[1200000,0.10],
[1600000,0.15],
[2000000,0.20],
[2400000,0.25],
[999999999,0.30]
];

let prev=0;

for(let i=0;i<slabs.length;i++){

let limit=slabs[i][0];
let rate=slabs[i][1];

if(income>limit){
tax+=(limit-prev)*rate;
prev=limit;
}else{
tax+=(income-prev)*rate;
break;
}
}

if(income<=1200000){
tax=0;
}
else{

let normalTax=tax;

if(normalTax>income-1200000){
normalTax=income-1200000;
}

tax=normalTax;
}

tax=tax*1.04;

return round(tax);
}

function calculateTax(){

let salary=Number(document.getElementById('salary').value)||0;
let hra=Number(document.getElementById('hra').value)||0;
let c80c=Number(document.getElementById('c80c').value)||0;
let c80d=Number(document.getElementById('c80d').value)||0;
let nps=Number(document.getElementById('nps').value)||0;
let home=Number(document.getElementById('home').value)||0;
let other=Number(document.getElementById('other').value)||0;

let oldIncome=
salary
-50000
-hra
-c80c
-c80d
-nps
-home
-other;

if(oldIncome<0) oldIncome=0;

let newIncome=
salary
-75000;

if(newIncome<0) newIncome=0;

let oldTax=oldRegimeTax(oldIncome);
let newTax=newRegimeTax(newIncome);

document.getElementById('oldIncome').innerHTML=
oldIncome.toLocaleString('en-IN');

document.getElementById('newIncome').innerHTML=
newIncome.toLocaleString('en-IN');

document.getElementById('oldTax').innerHTML=
oldTax.toLocaleString('en-IN');

document.getElementById('newTax').innerHTML=
newTax.toLocaleString('en-IN');

let savings=Math.abs(oldTax-newTax);

if(oldTax<newTax){

document.getElementById('saving').innerHTML=
"Save ₹ "+savings.toLocaleString('en-IN');

document.getElementById('recommend').innerHTML=
"Old Regime is Better";

}else if(newTax<oldTax){

document.getElementById('saving').innerHTML=
"Save ₹ "+savings.toLocaleString('en-IN');

document.getElementById('recommend').innerHTML=
"New Regime is Better";

}else{

document.getElementById('saving').innerHTML=
"No Tax Difference";

document.getElementById('recommend').innerHTML=
"Either Regime Can Be Chosen";
}

document.getElementById('result').style.display='block';
}

</script>

</body>
</html>
